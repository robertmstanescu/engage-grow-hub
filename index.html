<!doctype html>
<html lang="en">
  <head>
    <!-- ZOMBIE KILLER — must run before ANY other script/asset so we
         intercept stale service workers and bfcache restores before the
         old bundle has a chance to boot. Order matters: this block is
         intentionally the very first thing in <head>. -->
    <script>
      // 1) Safari Back-Forward cache buster: when a page is restored
      //    from bfcache (event.persisted === true) the JS heap, the
      //    React-Query cache and any in-flight subscriptions are all
      //    frozen-in-time snapshots. Force a fresh load.
      window.onpageshow = function (event) {
        if (event.persisted) {
          window.location.reload();
        }
      };
      // 2) Zombie service-worker killer. Earlier deploys may have
      //    registered a SW that intercepts fetches and serves stale
      //    assets indefinitely (especially on Safari). Unregister all
      //    of them and force ONE hard reload so the user lands on the
      //    fresh bundle. The sessionStorage flag prevents reload loops.
      if ("serviceWorker" in navigator) {
        navigator.serviceWorker.getRegistrations().then(function (regs) {
          if (regs.length === 0) return;
          Promise.all(regs.map(function (r) { return r.unregister(); })).then(function () {
            if (!sessionStorage.getItem("sw-cleared")) {
              sessionStorage.setItem("sw-cleared", "1");
              window.location.reload();
            }
          });
        });
      }
    </script>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!-- Safari hard-cache defeat: prevents the browser from serving a
         stale index.html (and therefore stale JS bundle references)
         from disk after a deploy. -->
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate, post-check=0, pre-check=0" />
    <meta http-equiv="Pragma" content="no-cache" />
    <meta http-equiv="Expires" content="0" />

    <!--
      ────────────────────────────────────────────────────────────────
      SSR MARKERS — DO NOT REMOVE
      ────────────────────────────────────────────────────────────────
      The Cloudflare Worker (Phase 2) inspects the User-Agent and, for
      bots / social-card scrapers, fetches the `ssr-index` edge function
      which swaps the marker pairs below for fresh database-driven
      values. Real users with JavaScript NEVER see these defaults —
      `usePageMeta` overwrites them within ~50ms.

      Marker pairs the edge function recognises:
        <!--SSR_TITLE-->…<!--/SSR_TITLE-->
        <!--SSR_DESCRIPTION-->…<!--/SSR_DESCRIPTION-->
        <!--SSR_OG_TAGS--><!--/SSR_OG_TAGS-->
        <!--SSR_JSONLD--><!--/SSR_JSONLD-->
        <!--SSR_NOSCRIPT--><!--/SSR_NOSCRIPT-->
        <!--SSR_CANONICAL--><!--/SSR_CANONICAL-->

      Defaults inside the markers are intentionally brand-NEUTRAL so
      that, even if the Worker is disabled or the edge function is
      down, no stale brand copy ships to the wider web.
      ────────────────────────────────────────────────────────────────
    -->
    <title><!--SSR_TITLE-->The Magic Coffin<!--/SSR_TITLE--></title>
    <meta name="description" content="<!--SSR_DESCRIPTION-->The Magic Coffin.<!--/SSR_DESCRIPTION-->" />
    <link rel="canonical" href="<!--SSR_CANONICAL-->https://themagiccoffin.com/<!--/SSR_CANONICAL-->" />

    <!--SSR_OG_TAGS-->
    <meta property="og:type" content="website" />
    <meta property="og:title" content="The Magic Coffin" />
    <meta property="og:url" content="https://themagiccoffin.com/" />
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="The Magic Coffin" />
    <!--/SSR_OG_TAGS-->

    <link rel="icon" type="image/x-icon" href="/favicon.ico" />

    <!--SSR_JSONLD--><!--/SSR_JSONLD-->
  </head>
  <body>
    <div id="root"></div>
    <!--SSR_NOSCRIPT--><!--/SSR_NOSCRIPT-->
    <script type="module" src="/src/main.tsx?v=BUILD_HASH"></script>
  </body>
</html>
