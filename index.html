    <!-- ZOMBIE KILLER — must run before ANY other script/asset so we
         intercept stale service workers and bfcache restores before the
         old bundle has a chance to boot. Order matters: this block is
         intentionally the very first thing in <head>. -->
    <script>
      // 1) Safari Back-Forward cache buster: when a page is restored
      //    from bfcache (event.persisted === true) the JS heap, the
      //    React-Query cache and any in-flight subscriptions are all
      //    frozen-in-time snapshots. Force a fresh load.
      window.onpageshow = function (event) {
        if (event.persisted) {
          window.location.reload();
        }
      };
      // 2) Zombie service-worker killer. Earlier deploys may have
      //    registered a SW that intercepts fetches and serves stale
      //    assets indefinitely (especially on Safari). Unregister all
      //    of them and force ONE hard reload so the user lands on the
      //    fresh bundle. The sessionStorage flag prevents reload loops.
      if ("serviceWorker" in navigator) {
        navigator.serviceWorker.getRegistrations().then(function (regs) {
          if (regs.length === 0) return;
          Promise.all(regs.map(function (r) { return r.unregister(); })).then(function () {
            if (!sessionStorage.getItem("sw-cleared")) {
              sessionStorage.setItem("sw-cleared", "1");
              window.location.reload();
            }
          });
        });
      }
    </script>

         stale index.html (and therefore stale JS bundle references)
         from disk after a deploy. -->

    <meta http-equiv="Pragma" content="no-cache" />
